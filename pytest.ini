[pytest]

testpaths = src/tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    cli: Testes de interface de linha de comando
    integration: Testes de integração (usam arquivos reais)
    unit: Testes unitários
    slow: Testes que demoram mais tempo

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

minversion = 6.0

log_cli = false
log_cli_level = INFO

norecursedirs = .git .venv build dist *.egg-info
