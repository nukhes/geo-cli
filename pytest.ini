[pytest]
# Configuração do pytest para o projeto geo-cli

# Diretório raiz de testes
testpaths = tests

# Padrão de descoberta de testes
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers customizados
markers =
    cli: Testes de interface de linha de comando
    integration: Testes de integração (usam arquivos reais)
    unit: Testes unitários
    slow: Testes que demoram mais tempo

# Opções de verbosidade
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Cobertura (se pytest-cov estiver instalado)
# --cov=src
# --cov-report=term-missing
# --cov-report=html

# Mínimo de Python
minversion = 6.0

# Log
log_cli = false
log_cli_level = INFO

# Timeout padrão (em segundos)
# timeout = 300

# Ignorar arquivos/diretórios
norecursedirs = .git .venv build dist *.egg-info
